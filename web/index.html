<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D 全链路交互台</title>
    <style>
      :root {
        --bg-0: #0b1118;
        --bg-1: #0f1a25;
        --panel: rgba(17, 29, 43, 0.82);
        --line: rgba(164, 195, 226, 0.2);
        --text-main: #edf4ff;
        --text-sub: #a8bfd9;
        --accent: #52d9b8;
        --accent-2: #42a6f7;
        --danger: #ff6f7d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--text-main);
        font-family: "DIN Alternate", "PingFang SC", "Segoe UI", sans-serif;
        background:
          radial-gradient(900px 400px at 10% -20%, rgba(66, 166, 247, 0.28), transparent 70%),
          radial-gradient(800px 500px at 85% -10%, rgba(82, 217, 184, 0.18), transparent 65%),
          linear-gradient(140deg, var(--bg-0), var(--bg-1));
      }

      .layout {
        display: grid;
        grid-template-columns: 360px 1fr;
        min-height: 100vh;
      }

      .sidebar {
        backdrop-filter: blur(8px);
        border-right: 1px solid var(--line);
        background: var(--panel);
        padding: 18px 16px 16px;
        overflow-y: auto;
      }

      .title {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0.03em;
      }

      .subtitle {
        margin: 6px 0 16px;
        color: var(--text-sub);
        font-size: 13px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px;
        background: rgba(8, 15, 26, 0.45);
        margin-bottom: 12px;
      }

      .card h3 {
        margin: 0 0 10px;
        font-size: 14px;
        color: #d4e8ff;
      }

      .help {
        margin: 0;
        color: var(--text-sub);
        font-size: 12px;
      }

      textarea,
      input[type="file"] {
        width: 100%;
        border: 1px solid rgba(164, 195, 226, 0.35);
        border-radius: 10px;
        background: rgba(6, 12, 20, 0.85);
        color: var(--text-main);
        padding: 10px;
      }

      textarea {
        min-height: 82px;
        resize: vertical;
      }

      .btn {
        width: 100%;
        margin-top: 8px;
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        cursor: pointer;
        color: #07221c;
        background: linear-gradient(135deg, var(--accent), #7cf0d5);
        font-weight: 700;
      }

      .btn.secondary {
        color: #001428;
        background: linear-gradient(135deg, var(--accent-2), #8cc9ff);
      }

      .status {
        min-height: 34px;
        border-radius: 10px;
        border: 1px solid var(--line);
        padding: 8px 10px;
        font-size: 13px;
        color: var(--text-sub);
      }

      .status.working {
        color: #e3f7ff;
        border-color: rgba(82, 217, 184, 0.55);
      }

      .status.error {
        color: #ffd7dc;
        border-color: rgba(255, 111, 125, 0.7);
      }

      .links a {
        display: block;
        color: #9ad2ff;
        font-size: 12px;
        margin: 6px 0;
        text-decoration: none;
        word-break: break-all;
      }

      .links a:hover {
        text-decoration: underline;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .actions button {
        border: 1px solid var(--line);
        border-radius: 9px;
        background: rgba(27, 50, 72, 0.8);
        color: var(--text-main);
        padding: 8px;
        cursor: pointer;
      }

      .actions button.active {
        border-color: rgba(82, 217, 184, 0.85);
        box-shadow: 0 0 0 1px rgba(82, 217, 184, 0.3) inset;
      }

      .viewer {
        position: relative;
        min-height: 100vh;
      }

      #canvasWrap {
        position: absolute;
        inset: 0;
      }

      #hint {
        position: absolute;
        right: 16px;
        bottom: 14px;
        font-size: 12px;
        color: var(--text-sub);
        background: rgba(6, 12, 20, 0.6);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 7px 12px;
      }

      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .viewer {
          min-height: 62vh;
        }
      }
    </style>
  </head>
  <body>
    <main class="layout">
      <section class="sidebar">
        <h1 class="title">3D 交互工作台</h1>
        <p class="subtitle">输入文字 / 图片 / 模型，自动生成可绑骨可交互结果。</p>

        <div class="card">
          <h3>文字生成</h3>
          <textarea id="textPrompt" placeholder="例如：A stylized robot with friendly face"></textarea>
          <button class="btn" id="runText">开始文字流程</button>
        </div>

        <div class="card">
          <h3>图片生成</h3>
          <input id="imageInput" type="file" accept="image/*" />
          <button class="btn secondary" id="runImage">开始图片流程</button>
        </div>

        <div class="card">
          <h3>已有模型后处理</h3>
          <input id="modelInput" type="file" accept=".glb,.gltf,.fbx,.obj,.stl" />
          <button class="btn secondary" id="runModel">开始模型流程</button>
        </div>

        <div class="card">
          <h3>动作策略</h3>
          <select id="actionPolicy" style="width:100%; border:1px solid rgba(164,195,226,.35); border-radius:10px; background:rgba(6,12,20,.85); color:var(--text-main); padding:10px; margin-bottom:8px;">
            <option value="strict" selected>strict（稳定优先）</option>
            <option value="balanced">balanced（动作丰富）</option>
          </select>
          <p class="help">strict 更稳，balanced 会尝试保留更多动作。</p>
        </div>

        <div class="card">
          <h3>处理状态</h3>
          <div id="status" class="status">等待提交任务</div>
          <div class="links" id="resultLinks"></div>
        </div>

        <div class="card">
          <h3>预设动作</h3>
          <label class="help" style="display:block; margin-bottom: 8px;">
            <input id="safeModeToggle" type="checkbox" checked /> 仅显示安全动作
          </label>
          <div id="actions" class="actions"></div>
          <p class="help">默认仅显示稳定动作；取消勾选可显示高风险动作。</p>
        </div>

        <div class="card">
          <h3>动作质量报告</h3>
          <div id="actionReport" class="help">等待生成动作报告</div>
        </div>
      </section>

      <section class="viewer">
        <div id="canvasWrap"></div>
        <div id="hint">点击画面循环动作，滚轮缩放，右键平移</div>
      </section>
    </main>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.162.0/build/three.module.js"
        }
      }
    </script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
